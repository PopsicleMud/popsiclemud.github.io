<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;
  --grass:#4ade80;--grass-glow:rgba(74,222,128,0.25);
  --dirt:#8B5E3C;--dirt-hi:#A87450;--dirt-lo:#5C3A1E;
  --empty:#0d1117;--text:#e6edf3;--dim:#8b949e;
  --gold:#f0a500;--gold-glow:rgba(240,165,0,0.3);
}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%,#0d2a1a 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 10% 90%,#1a1000 0%,transparent 50%);
  color:var(--text);font-family:'Press Start 2P',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:20px 12px 32px;gap:16px;
}
.header{text-align:center}
.title{
  font-size:clamp(0.65em,3.5vw,1em);color:var(--grass);
  text-shadow:0 0 20px var(--grass-glow),3px 3px 0 #000;
  letter-spacing:3px;line-height:1.6;
}
.subtitle{font-size:0.38em;color:var(--dim);margin-top:8px;letter-spacing:1px}
.panel{
  background:var(--panel);border:2px solid var(--border);border-radius:4px;
  padding:14px 18px;width:100%;max-width:660px;
  display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:center;
}
.ctrl{display:flex;flex-direction:column;align-items:center;gap:8px}
.ctrl-label{font-size:0.37em;color:var(--dim);letter-spacing:2px}
.diam-row{display:flex;align-items:center;gap:8px}
input[type=range]{
  -webkit-appearance:none;width:120px;height:6px;
  background:linear-gradient(to right,var(--grass) var(--pct,50%),#2d333b var(--pct,50%));
  border-radius:3px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--grass);border-radius:2px;cursor:pointer;
  box-shadow:0 0 8px var(--grass-glow);
}
input[type=number]{
  width:52px;background:#0d1117;border:2px solid var(--border);
  color:var(--grass);font-family:'Press Start 2P',monospace;
  font-size:0.7em;padding:5px 4px;border-radius:2px;text-align:center;
}
input[type=number]:focus{outline:none;border-color:var(--grass);box-shadow:0 0 6px var(--grass-glow)}
.toggle{display:flex;border:2px solid var(--border);border-radius:3px;overflow:hidden}
.tog-btn{
  background:#0d1117;color:var(--dim);border:none;
  font-family:'Press Start 2P',monospace;font-size:0.4em;
  padding:8px 12px;cursor:pointer;transition:all .15s;
}
.tog-btn.active{background:var(--grass);color:#000;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.3)}
.tog-btn:hover:not(.active){background:#21262d;color:var(--text)}
.sphere-nav{
  width:100%;max-width:660px;
  background:var(--panel);border:2px solid var(--border);border-radius:4px;
  padding:12px 16px;display:none;
  flex-direction:column;align-items:center;gap:10px;
}
.sphere-nav.visible{display:flex}
.nav-row{display:flex;align-items:center;gap:14px}
.nav-btn{
  background:#0d1117;color:var(--text);border:2px solid var(--border);border-radius:3px;
  font-family:'Press Start 2P',monospace;font-size:0.5em;
  padding:8px 14px;cursor:pointer;transition:all .12s;user-select:none;
}
.nav-btn:hover:not(:disabled){border-color:var(--grass);color:var(--grass);background:#0f1f12}
.nav-btn:active:not(:disabled){transform:scale(0.95)}
.nav-btn:disabled{opacity:0.25;cursor:default}
.layer-info{text-align:center}
.layer-main{font-size:0.55em;color:var(--grass);min-width:130px}
.layer-sub{font-size:0.35em;color:var(--dim);margin-top:5px}
.progress-track{width:220px;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.progress-fill{
  height:100%;background:linear-gradient(to right,var(--dirt),var(--grass));
  border-radius:3px;transition:width .2s ease;
}
.canvas-outer{
  overflow:auto;max-width:660px;max-height:580px;
  background:#000;border:2px solid var(--border);border-radius:4px;
}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
.stats{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%;max-width:660px}
.stat{
  background:var(--panel);border:2px solid var(--border);border-radius:4px;
  padding:10px 14px;display:flex;flex-direction:column;
  align-items:center;gap:5px;flex:1;min-width:110px;
}
.stat-lbl{font-size:0.33em;color:var(--dim);letter-spacing:1px}
.stat-val{font-size:0.75em;color:var(--gold);text-shadow:0 0 10px var(--gold-glow)}
.legend{
  display:flex;flex-wrap:wrap;gap:14px;font-size:0.37em;color:var(--dim);
  align-items:center;justify-content:center;
}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-sw{width:12px;height:12px;border-radius:1px;flex-shrink:0}
.kbd-hint{font-size:0.33em;color:var(--dim);text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="title">⛏ BLOCK SHAPE BUILDER</div>
  <div class="subtitle">circle &amp; sphere calculator for minecraft</div>
</div>

<div class="panel">
  <div class="ctrl">
    <span class="ctrl-label">Diameter</span>
    <div class="diam-row">
      <input type="range" id="slider" min="2" max="100" value="16">
      <input type="number" id="numIn"  min="2" max="100" value="16">
    </div>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Shape</span>
    <div class="toggle">
      <button class="tog-btn active" id="btnC" onclick="setMode('circle')">CIRCLE</button>
      <button class="tog-btn"        id="btnS" onclick="setMode('sphere')">SPHERE</button>
    </div>
  </div>
</div>

<div class="sphere-nav" id="sphereNav">
  <div class="nav-row">
    <button class="nav-btn" id="btnDown" onclick="changeLayer(-1)">▼ DOWN</button>
    <div class="layer-info">
      <div class="layer-main" id="layerMain">Layer 1 / 1</div>
      <div class="layer-sub"  id="layerSub">Y offset: ±0</div>
    </div>
    <button class="nav-btn" id="btnUp" onclick="changeLayer(1)">UP ▲</button>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:50%"></div></div>
  <div class="kbd-hint">↑ ↓ arrow keys to navigate layers</div>
</div>

<div class="canvas-outer">
  <canvas id="grid"></canvas>
</div>

<div class="stats">
  <div class="stat">
    <span class="stat-lbl" id="statLayerLbl">BLOCKS</span>
    <span class="stat-val" id="statLayer">0</span>
  </div>
  <div class="stat" id="statTotalBox" style="display:none">
    <span class="stat-lbl">TOTAL BLOCKS</span>
    <span class="stat-val" id="statTotal">0</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">DIAMETER</span>
    <span class="stat-val" id="statDiam">16</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">GRID SIZE</span>
    <span class="stat-val" id="statGrid">16×16</span>
  </div>
</div>

<div class="legend">
  <div class="leg-item">
    <div class="leg-sw" style="background:#7B5230;box-shadow:inset -2px -2px 0 #5C3A1E,inset 2px 2px 0 #9A6840"></div>
    Block
  </div>
  <div class="leg-item">
    <div class="leg-sw" style="background:#0d1117;border:1px solid #21262d"></div>
    Empty
  </div>
  <div class="leg-item">
    <div class="leg-sw" style="background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.5)"></div>
    Center
  </div>
</div>

<script>
let diam     = 16;
let mode     = 'circle';
let curLayer = 8;

// ── Algorithm ─────────────────────────────────────────────────────────────
// For ODD diameter D: true integer radius = floor(D/2), center is on a block.
// For EVEN diameter D: radius = D/2 (integer), center falls between 4 blocks.
// In both cases Math.floor(D/2) gives the correct integer radius.
// A cell is a shell block when its distance from center is within 0.5 of r.

function circleR(d) {
  return Math.floor(d / 2);
}

function isShellBlock(x, y, cx, cy, r) {
  if (r < 0) return false;
  const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
  if (r < 0.5) return dist < 0.5;           // degenerate tiny radius → center dot
  return Math.abs(dist - r) < 0.5;
}

function buildBlocks(d, r) {
  const cx = (d - 1) / 2;
  const cy = (d - 1) / 2;
  const set = new Set();
  for (let x = 0; x < d; x++)
    for (let y = 0; y < d; y++)
      if (isShellBlock(x, y, cx, cy, r))
        set.add(x * d + y);
  return set;
}

// Sphere: at each layer compute the horizontal circle radius.
// Use Math.floor(d/2) as the sphere radius so odd-diameter spheres
// are consistent with their odd-diameter circle cross-sections.
function sphereLayerR(d, layerIdx) {
  const rSphere = circleR(d);               // ← floor, not d/2
  const center  = (d - 1) / 2;
  const dh      = layerIdx - center;
  const rh      = Math.sqrt(rSphere * rSphere - dh * dh);
  return isNaN(rh) || rh < 0 ? 0 : rh;
}

let _cache = { d: -1, total: 0 };
function sphereTotal(d) {
  if (_cache.d === d) return _cache.total;
  let t = 0;
  for (let l = 0; l < d; l++) t += buildBlocks(d, sphereLayerR(d, l)).size;
  _cache = { d, total: t };
  return t;
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const canvas = document.getElementById('grid');
  const ctx    = canvas.getContext('2d');
  const d      = diam;

  const maxPx = 580;
  const cell  = Math.max(4, Math.min(28, Math.floor(maxPx / d)));
  const sz    = d * cell;
  canvas.width  = sz;
  canvas.height = sz;

  let blocks, layerR;
  if (mode === 'circle') {
    layerR = circleR(d);
    blocks = buildBlocks(d, layerR);
  } else {
    layerR = sphereLayerR(d, curLayer);
    blocks = buildBlocks(d, layerR);
  }

  const cx = (d - 1) / 2;
  const cy = (d - 1) / 2;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, sz, sz);

  for (let x = 0; x < d; x++) {
    for (let y = 0; y < d; y++) {
      const px = x * cell;
      const py = y * cell;
      if (blocks.has(x * d + y)) {
        ctx.fillStyle = '#7B5230';
        ctx.fillRect(px, py, cell, cell);
        ctx.fillStyle = '#9A6840';
        ctx.fillRect(px, py, cell, 2);
        ctx.fillRect(px, py, 2, cell);
        ctx.fillStyle = '#4E2E10';
        ctx.fillRect(px, py + cell - 2, cell, 2);
        ctx.fillRect(px + cell - 2, py, 2, cell);
        ctx.fillStyle = '#7B5230';
        ctx.fillRect(px + 2, py + 2, cell - 4, cell - 4);
        if (cell >= 10) {
          ctx.fillStyle = 'rgba(0,0,0,0.18)';
          ctx.fillRect(px + 4, py + 4, 2, 2);
          ctx.fillRect(px + cell - 6, py + cell - 6, 2, 2);
          ctx.fillRect(px + cell - 6, py + 4, 2, 2);
          ctx.fillRect(px + 4, py + cell - 6, 2, 2);
        }
      } else {
        ctx.fillStyle = '#111820';
        ctx.fillRect(px, py, cell, cell);
      }
    }
  }

  // Grid lines
  ctx.strokeStyle = '#1c2128';
  ctx.lineWidth = 1;
  for (let i = 0; i <= d; i++) {
    ctx.beginPath(); ctx.moveTo(i * cell + 0.5, 0); ctx.lineTo(i * cell + 0.5, sz); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cell + 0.5); ctx.lineTo(sz, i * cell + 0.5); ctx.stroke();
  }

  // Center crosshair
  if (cell >= 5) {
    ctx.strokeStyle = 'rgba(74,222,128,0.35)';
    ctx.lineWidth = 1;
    const midX = cx * cell + cell / 2;
    const midY = cy * cell + cell / 2;
    const arm  = Math.max(6, cell * 1.5);
    ctx.beginPath();
    ctx.moveTo(midX - arm, midY + 0.5); ctx.lineTo(midX + arm, midY + 0.5);
    ctx.moveTo(midX + 0.5, midY - arm); ctx.lineTo(midX + 0.5, midY + arm);
    ctx.stroke();
  }

  // Stats
  document.getElementById('statLayer').textContent = blocks.size;
  document.getElementById('statDiam').textContent  = d;
  document.getElementById('statGrid').textContent  = `${d}×${d}`;

  if (mode === 'sphere') {
    const center = (d - 1) / 2;
    const dh     = curLayer - center;
    const sign   = dh === 0 ? '±0' : (dh > 0 ? '+' + Math.round(Math.abs(dh)) : '−' + Math.round(Math.abs(dh)));
    document.getElementById('layerMain').textContent = `Layer ${curLayer + 1} / ${d}`;
    document.getElementById('layerSub').textContent  = `Y offset: ${sign}`;
    document.getElementById('btnUp').disabled   = curLayer >= d - 1;
    document.getElementById('btnDown').disabled = curLayer <= 0;
    document.getElementById('progFill').style.width = (curLayer / Math.max(d - 1, 1) * 100) + '%';
    document.getElementById('statTotal').textContent = sphereTotal(d);
  }
}

// ── Controls ─────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnC').classList.toggle('active', m === 'circle');
  document.getElementById('btnS').classList.toggle('active', m === 'sphere');
  document.getElementById('sphereNav').classList.toggle('visible', m === 'sphere');
  document.getElementById('statTotalBox').style.display = m === 'sphere' ? 'flex' : 'none';
  document.getElementById('statLayerLbl').textContent   = m === 'sphere' ? 'LAYER BLOCKS' : 'BLOCKS';
  if (m === 'sphere') curLayer = Math.round((diam - 1) / 2);
  render();
}

function changeLayer(delta) {
  curLayer = Math.max(0, Math.min(diam - 1, curLayer + delta));
  render();
}

function setDiam(v) {
  v = Math.max(2, Math.min(100, v | 0));
  diam = v;
  document.getElementById('slider').value = v;
  document.getElementById('numIn').value  = v;
  const pct = ((v - 2) / 98 * 100).toFixed(1);
  document.getElementById('slider').style.setProperty('--pct', pct + '%');
  if (mode === 'sphere') curLayer = Math.round((diam - 1) / 2);
  render();
}

document.getElementById('slider').addEventListener('input', function() { setDiam(+this.value); });
document.getElementById('numIn').addEventListener('change', function() { setDiam(+this.value); this.value = diam; });

document.addEventListener('keydown', e => {
  if (mode !== 'sphere') return;
  if (e.key === 'ArrowUp')   { e.preventDefault(); changeLayer(1);  }
  if (e.key === 'ArrowDown') { e.preventDefault(); changeLayer(-1); }
});

setDiam(16);
</script>
</body>
</html>
